version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: clinical_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_DB: clinical_os
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: clinical_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: clinical_timescale
    environment:
      POSTGRES_PASSWORD: telemetrypassword
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clinical_redis
    ports:
      - "6380:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: clinical_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - qdrant
      - redis
      - timescaledb
    volumes:
      - ./backend/app:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: clinical_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  timescale_data: